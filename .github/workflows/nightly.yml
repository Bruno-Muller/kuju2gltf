name: Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'  # Every day at 02:00 UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build executable
        run: pyinstaller kuju2gltf.spec

      - name: Upload nightly artifact
        uses: actions/upload-artifact@v4
        with:
          name: kuju2gltf-nightly-${{ github.run_number }}
          path: dist/kuju2gltf.exe
          retention-days: 7

      - name: Create/Update nightly release
        uses: ncipollo/release-action@v1
        with:
          tag: nightly
          name: Nightly Build
          body: |
            Latest nightly build - built on ${{ github.event.head_commit.timestamp }}
            Commit: ${{ github.sha }}
          artifacts: dist/kuju2gltf.exe
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}

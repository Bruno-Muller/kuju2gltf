name: Nightly Build

on:
  push:
    branches:
      - main
  # schedule:
  #   - cron: '0 2 * * *'  # Every day at 02:00 UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  build:
    uses: ./.github/workflows/build.yml

  publish:
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download executable
        uses: actions/download-artifact@v4
        with:
          name: kuju2gltf-exe
          path: dist/

      - name: Upload nightly artifact
        uses: actions/upload-artifact@v4
        with:
          name: kuju2gltf-nightly-${{ github.run_number }}
          path: dist/kuju2gltf.exe
          retention-days: 7

      - name: Create/Update nightly release
        uses: ncipollo/release-action@v1
        with:
          tag: nightly
          name: Nightly Build
          body: |
            Latest nightly build - built on ${{ github.event.head_commit.timestamp }}
            Commit: ${{ github.sha }}
          artifacts: dist/kuju2gltf.exe
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
